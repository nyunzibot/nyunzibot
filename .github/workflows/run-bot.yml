name: Run NyunziBot

on:
  schedule:
    # Fire every minute — concurrency ensures only one instance runs at a time
    - cron: '* * * * *'
  workflow_dispatch:  # Allow manual trigger from Actions tab

concurrency:
  group: bot-runner
  cancel-in-progress: false  # Don't kill the running bot; just skip the new trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h 50m — safely under the 6-hour GitHub Actions limit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install and connect Cloudflare WARP
        run: |
          # Add Cloudflare GPG key and repository
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          # Install WARP client
          sudo apt-get update && sudo apt-get install -y cloudflare-warp

          # Register (free tier, no account needed) and connect
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect

          # Wait for connection to establish
          sleep 5

          # Verify WARP is active
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep warp

      - name: Run bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          RULE34_API_KEY: ${{ secrets.RULE34_API_KEY }}
          RULE34_USER_ID: ${{ secrets.RULE34_USER_ID }}
          GELBOORU_API_KEY: ${{ secrets.GELBOORU_API_KEY }}
          GELBOORU_USER_ID: ${{ secrets.GELBOORU_USER_ID }}
          KONACHAN_API_KEY: ${{ secrets.KONACHAN_API_KEY }}
          KONACHAN_LOGIN_ID: ${{ secrets.KONACHAN_LOGIN_ID }}
          DANBOORU_API_KEY: ${{ secrets.DANBOORU_API_KEY }}
          DANBOORU_LOGIN_ID: ${{ secrets.DANBOORU_LOGIN_ID }}
          PIXIV_REFRESH_TOKEN: ${{ secrets.PIXIV_REFRESH_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python bot.py
